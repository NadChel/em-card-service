server:
  port: 8100
  error:
    include-message: always
spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/oauth2/jwks}
  config:
    import: "optional:file:.env[.properties]"
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE

springdoc:
  swagger-ui:
    operationsSorter: alpha

app:
  encryption:
    password: ${APP_ENCRYPTION_PASSWORD}
    salt: ${APP_ENCRYPTION_SALT}